[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## [unreleased]
{% endif %}

{% set breaking = commits | filter(attribute="breaking", value=true) %}
{% if breaking | length != 0 %}
### ⚠️ Breaking Changes
{% for commit in breaking %}
- {{ commit.message | upper_first }}
{% endfor %}

{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}{% if commit.links %} ({% for link in commit.links %}[#{{ link.text }}]({{ link.href }}){% if not loop.last %}, {% endif %}{% endfor %}){% endif %}
{% endfor %}

{% endfor %}
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
postprocessors = [
  { pattern = "\\((#([0-9]+))\\)", replace = "([#$2](https://github.com/DataChefHQ/aws-data-landing-zone/pull/$2))" },
  { pattern = "\n{3,}", replace = "\n\n" },
]

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

commit_preprocessors = [
  { pattern = "^Merge pull request #([0-9]+) from .*$", replace = "merge: pull request #$1" },
  { pattern = "^Merge remote-tracking branch '.*'$", replace = "" },
]

commit_parsers = [
  { message = "^feat(\\([^)]+\\))?!?:", group = "Features" },
  { message = "^fix(\\([^)]+\\))?!?:", group = "Bug Fixes" },
  { message = "^docs(\\([^)]+\\))?!?:", group = "Documentation" },
  { message = "^refactor(\\([^)]+\\))?!?:", group = "Refactoring" },
  { message = "^perf(\\([^)]+\\))?!?:", group = "Performance" },
  { message = "^ci(\\([^)]+\\))?!?:", group = "CI/CD" },
  { message = "^build(\\([^)]+\\))?!?:", group = "Build" },
  { message = "^test(\\([^)]+\\))?!?:", group = "Tests" },
  { message = "^chore(\\([^)]+\\))?!?:", group = "Chores" },
  { message = "^revert(\\([^)]+\\))?!?:", group = "Reverts" },
  { message = "^merge:", skip = true },
  { message = "^last touches$", skip = true },
]
link_parsers = [
  { pattern = "#([0-9]+)", href = "https://github.com/DataChefHQ/aws-data-landing-zone/pull/$1", text = "$1" },
]
