name: compat
on:
  pull_request: {}
  workflow_dispatch: {}
jobs:
  compat:
    name: API Compatibility Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Compile
        run: npx projen compile
      - name: API compatibility check
        run: npx projen compat
